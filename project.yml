name: LobKit
options:
  bundleIdPrefix: com.vanaheim-labs
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.vanaheim-labs.lobkit
    PRODUCT_NAME: LobKit
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_ENTITLEMENTS: LobKit/LobKit.entitlements
  configs:
    Debug:
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: G7LZTFPMNC
      CODE_SIGN_IDENTITY: "-"
    Release:
      CODE_SIGN_STYLE: Manual
      DEVELOPMENT_TEAM: G7LZTFPMNC
      CODE_SIGN_IDENTITY: "Developer ID Application"

targets:
  LobKit:
    type: application
    platform: macOS
    sources:
      - path: LobKit/Sources/LobKit
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vanaheim-labs.lobkit
        INFOPLIST_FILE: LobKit/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
